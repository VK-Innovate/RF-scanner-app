name: Build RF Scanner APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK using Kivy Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/android_app:/home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Find APK
        run: |
          find . -name "*.apk" 2>/dev/null
          ls android_app/bin/ 2>/dev/null || echo "No bin folder"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rf-scanner-apk
          path: android_app/bin/*.apk
          retention-days: 30
