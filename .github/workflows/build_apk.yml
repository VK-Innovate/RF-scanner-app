name: Build RF Scanner APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-11-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential \
            libtinfo5
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-v9-${{ hashFiles('android_app/buildozer.spec') }}
          restore-keys: buildozer-v9-

      - name: Setup SDK and NDK in buildozer paths
        run: |
          mkdir -p ~/.buildozer/android/platform

          # SDK — symlink GitHub's pre-installed one
          ln -sf /usr/local/lib/android/sdk \
            ~/.buildozer/android/platform/android-sdk

          # Accept licenses
          sudo mkdir -p /usr/local/lib/android/sdk/licenses
          echo -e "24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd" \
            | sudo tee /usr/local/lib/android/sdk/licenses/android-sdk-license

          # NDK — copy GitHub's pre-installed NDK to exact name buildozer expects
          # buildozer 1.5.0 expects: android-ndk-r25b
          cp -r /usr/local/lib/android/sdk/ndk/27.3.13750724 \
            ~/.buildozer/android/platform/android-ndk-r25b

          echo "=== Platform folder ==="
          ls ~/.buildozer/android/platform/
          echo "=== NDK folder ==="
          ls ~/.buildozer/android/platform/android-ndk-r25b/ | head -5

      - name: Build APK
        working-directory: android_app
        run: |
          buildozer -v android debug 2>&1 | tail -500

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rf-scanner-apk
          path: android_app/bin/*.apk
          retention-days: 30