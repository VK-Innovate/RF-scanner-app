name: Build RF Scanner APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-11-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential
            pip install cython==0.29.33
            pip install buildozer python-for-android
      - name: Accept SDK licenses
        run: |
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          sudo mkdir -p /usr/local/lib/android/sdk/licenses
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n84831b9409646a918e30573bab4c9c91346d8abd" \
            | sudo tee /usr/local/lib/android/sdk/licenses/android-sdk-license
          printf "d975f751698a77b662f1254ddbeed3901e976f5a" \
            | sudo tee /usr/local/lib/android/sdk/licenses/android-sdk-preview-license

      - name: Install SDK build tools
        run: |
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "platform-tools" || true

      - name: Build APK with p4a directly
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/27.3.13750724
          
          p4a apk \
            --private android_app \
            --package org.rfscanner \
            --name "RF Scanner" \
            --version 1.0 \
            --bootstrap sdl2 \
            --requirements python3,kivy,requests,pyjnius \
            --arch arm64-v8a \
            --permission INTERNET \
            --permission ACCESS_WIFI_STATE \
            --permission CHANGE_WIFI_STATE \
            --permission ACCESS_FINE_LOCATION \
            --permission ACCESS_COARSE_LOCATION \
            --sdk-dir /usr/local/lib/android/sdk \
            --ndk-dir /usr/local/lib/android/sdk/ndk/27.3.13750724 \
            --android-api 33 \
            --ndk-api 26 \
            2>&1 | tail -300

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rf-scanner-apk
          path: "*.apk"
          retention-days: 30
